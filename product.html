  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"26\" viewBox=\"0 0 200 200\"><use href=\"#oo-gold\"><\u002Fuse><\u002Fsvg>\n        <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:18px; letter-spacing:-0.01em; color:#f0e6d4;\">OmniOrbits<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display:flex; align-items:center; gap:36px;\">\n        <a href=\"index.html\" class=\"oo-link\" style=\"font-family:'IBM Plex Sans',sans-serif; font-size:14.5px; color:#cbbcd4;\">Home<\u002Fa>\n        <a href=\"product.html\" class=\"oo-link\" style=\"font-family:'IBM Plex Sans',sans-serif; font-size:14.5px; color:#f0e6d4;\">Product<\u002Fa>\n        <a href=\"mailto:hello@omniorbits.com\" style=\"font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:14px; color:#1c1027; background:#d3ac72; padding:10px 20px; border-radius:5px; text-decoration:none;\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <section style=\"position:relative; background:radial-gradient(120% 80% at 50% 0%, #3a2750 0%, #241634 45%, #1c1027 100%); padding:90px 64px 100px;\">\n    <div style=\"max-width:820px; margin:0 auto; text-align:center;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.3em; color:#d3ac72; margin-bottom:24px;\">THE PLATFORM<\u002Fdiv>\n      <h1 style=\"font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:56px; line-height:1.08; letter-spacing:-0.03em; color:#f6efe2; margin:0 0 22px;\">WMS. TMS. LMS.<br>One orbit.<\u002Fh1>\n      <p style=\"font-size:18px; line-height:1.6; color:#a596b0; margin:0 auto; max-width:560px;\">Three systems, purpose-built around your operation, unified by one AI control layer that moves data and decisions between them automatically.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WMS -->\n  <section id=\"wms\" style=\"background:#f2ece1; color:#2c1d3d; padding:100px 64px;\">\n    <div style=\"max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start;\">\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:20px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#b8924f;\">[01]<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.18em; color:#8a7c92;\">WAREHOUSE MANAGEMENT<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.02em; margin:0 0 20px;\">Inventory and fulfillment that runs itself.<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.7; color:#5c564e; margin:0;\">Receiving, putaway, slotting, picking, packing, and cycle counts — orchestrated by AI and configured around your SKU profile and facility layout, not forced into a generic template. As volume shifts, the system adjusts pick paths and labor allocation on its own.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Real-time inventory accuracy across every location<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">AI-optimized slotting and pick paths<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Automated replenishment triggers<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Exception handling without a manual queue<\u002Fdiv>\n        <div style=\"padding:20px 0; font-size:15px; color:#2c1d3d;\">Configured to your existing workflows, not the reverse<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TMS -->\n  <section id=\"tms\" style=\"background:#2c1d3d; color:#e8dcf0; padding:100px 64px;\">\n    <div style=\"max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start;\">\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:20px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#d3ac72;\">[02]<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.18em; color:#a07fae;\">TRANSPORTATION MANAGEMENT<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.02em; color:#f0e6d4; margin:0 0 20px;\">Routing and dispatch without the spreadsheets.<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.7; color:#c5b7cf; margin:0;\">Carrier selection, load building, route optimization, dock scheduling, and freight audit — automated end to end. Dispatchers stop reconciling manually across email and spreadsheets, and start managing the exceptions that actually need a person.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <div style=\"padding:20px 0; border-bottom:1px solid rgba(211,172,114,0.2); font-size:15px; color:#f0e6d4;\">AI-driven carrier and route selection<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid rgba(211,172,114,0.2); font-size:15px; color:#f0e6d4;\">Automated load building and dock scheduling<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid rgba(211,172,114,0.2); font-size:15px; color:#f0e6d4;\">Real-time shipment visibility<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid rgba(211,172,114,0.2); font-size:15px; color:#f0e6d4;\">Freight audit and settlement automation<\u002Fdiv>\n        <div style=\"padding:20px 0; font-size:15px; color:#f0e6d4;\">Customized to your lanes and carrier mix<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LMS -->\n  <section id=\"lms\" style=\"background:#f2ece1; color:#2c1d3d; padding:100px 64px;\">\n    <div style=\"max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start;\">\n      <div>\n        <div style=\"display:flex; align-items:baseline; gap:18px; margin-bottom:20px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#b8924f;\">[03]<\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.18em; color:#8a7c92;\">LABOR MANAGEMENT<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.02em; margin:0 0 20px;\">Workforce planning that matches demand in real time.<\u002Fh2>\n        <p style=\"font-size:16px; line-height:1.7; color:#5c564e; margin:0;\">Shift planning, task assignment, productivity tracking, and incentive calculation — driven by actual order volume instead of a static schedule. Labor cost tracks activity, not guesswork, and supervisors see productivity as it happens instead of at end of shift.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Demand-based shift and headcount planning<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Dynamic task assignment across the floor<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Real-time productivity tracking<\u002Fdiv>\n        <div style=\"padding:20px 0; border-bottom:1px solid #ddd1c0; font-size:15px; color:#2c1d3d;\">Automated incentive and labor-standard calculations<\u002Fdiv>\n        <div style=\"padding:20px 0; font-size:15px; color:#2c1d3d;\">Built around your labor rules and shift structure<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT FITS -->\n  <section style=\"background:#1c1027; color:#cbbcd4; padding:100px 64px; border-top:1px solid rgba(211,172,114,0.15);\">\n    <div style=\"max-width:820px; margin:0 auto; text-align:center;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.18em; color:#9c8aa8; margin-bottom:20px;\">[04] HOW IT FITS TOGETHER<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.02em; color:#f0e6d4; margin:0 0 22px;\">One AI layer orchestrating all three.<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.7; color:#a596b0; margin:0;\">OmniOrbits' AI control layer sits above WMS, TMS, and LMS, moving data and decisions between them automatically — an inbound delay updates labor plans and outbound routing without anyone re-entering data. It's built to fit your existing tech stack, integrating with the ERP, EDI, and carrier systems you already run.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"background:#d3ac72; color:#1c1027; padding:80px 64px; text-align:center;\">\n    <div style=\"max-width:640px; margin:0 auto;\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:34px; letter-spacing:-0.02em; margin:0 0 16px;\">Ready to put your operation in orbit?<\u002Fh2>\n      <p style=\"font-size:16px; line-height:1.6; margin:0 0 32px; color:#4a3a1c;\">Tell us about your operation and we'll walk you through a system built around it.<\u002Fp>\n      <a href=\"mailto:hello@omniorbits.com\" style=\"font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:15px; color:#f0e6d4; background:#1c1027; padding:15px 34px; border-radius:6px; text-decoration:none;\">Request a walkthrough<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#1c1027; color:#9c8aa8; pad
